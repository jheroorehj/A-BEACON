name: Notify parent repo

on:
  push:
    branches: [master]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger iamhero submodule sync
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.IAMHERO_PAT }}" \
            https://api.github.com/repos/jheroorehj/iamhero/dispatches \
            -d '{"event_type":"a-beacon-updated"}'
